<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sign In API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }
        
        .result.info {
            background: #d1ecf1;
            border: 2px solid #bee5eb;
            color: #0c5460;
        }
        
        .result h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .result pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-badge.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Test Sign In API</h1>
        <p class="subtitle">Test the authentication endpoint directly</p>
        
        <div class="form-group">
            <label>API Base URL</label>
            <input type="text" id="apiUrl" value="http://localhost:8000/api/v1" />
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="test@example.com" placeholder="Enter email" />
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" value="Test123456" placeholder="Enter password" />
        </div>
        
        <button onclick="testLogin()" id="loginBtn">
            Sign In
        </button>
        
        <div id="result"></div>
    </div>

    <script>
        async function testLogin() {
            const apiUrl = document.getElementById('apiUrl').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const loginBtn = document.getElementById('loginBtn');
            
            // Clear previous result
            resultDiv.innerHTML = '';
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loader"></span> Signing in...';
            
            try {
                // Test backend connectivity first
                resultDiv.innerHTML = `
                    <div class="result info">
                        <h3>🔍 Testing backend connectivity...</h3>
                        <p>Checking if backend is running at ${apiUrl}</p>
                    </div>
                `;
                
                const healthCheck = await fetch(`${apiUrl}/auth/token/verify/`, {
                    method: 'GET',
                }).catch(() => null);
                
                if (!healthCheck) {
                    throw new Error('Backend is not running or not accessible');
                }
                
                // Attempt login
                resultDiv.innerHTML = `
                    <div class="result info">
                        <h3>🔐 Attempting login...</h3>
                        <p>Sending credentials to ${apiUrl}/auth/login/</p>
                    </div>
                `;
                
                const response = await fetch(`${apiUrl}/auth/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access) {
                    // Success
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ Login Successful!</h3>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                            <p><strong>User:</strong> ${data.user?.email || 'N/A'}</p>
                            <p><strong>Role:</strong> ${data.user?.role || 'N/A'}</p>
                            <p><strong>Access Token:</strong> ${data.access.substring(0, 30)}...</p>
                            <p><strong>Refresh Token:</strong> ${data.refresh.substring(0, 30)}...</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <p style="margin-top: 15px;">✨ You can now use these credentials at <a href="http://localhost:3000/signin" target="_blank">http://localhost:3000/signin</a></p>
                        </div>
                    `;
                } else {
                    // Error response from server
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ Login Failed</h3>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                            <p><strong>Error:</strong> ${data.error || data.detail || 'Invalid credentials'}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            ${response.status === 401 ? `
                                <p style="margin-top: 15px;">💡 <strong>Tip:</strong> Create a test user by running:</p>
                                <pre>cd backend
python manage.py create_test_user</pre>
                            ` : ''}
                        </div>
                    `;
                }
            } catch (error) {
                // Network or other error
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Connection Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p style="margin-top: 15px;">💡 <strong>Troubleshooting:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>Make sure Django backend is running: <code>python manage.py runserver</code></li>
                            <li>Check if backend is accessible at ${apiUrl}</li>
                            <li>Verify CORS is configured in Django settings</li>
                            <li>Check browser console for more details</li>
                        </ul>
                    </div>
                `;
            } finally {
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        }
        
        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                testLogin();
            }
        });
    </script>
</body>
</html>
